		Mob.prototype.injure=function(damage,petal) {

						}
					}
					for(let i=0;i<fight.petal.length;i++) if(fight.petal[i].state==="Existing" && fight.petal[i].name!=="Web" && fight.petal[i].y===6 && determine(150-10*fight.petal[i].size,true," for drag")) {
						if(getFilledGrid(fight.petal[i].x,fight.petal[i].y-1)) {
							fight.petal[i].injure(this.damage,"Drag")
						} else {
							addLog("[Petal] "+translateText(fight.petal[i].name)+translateText(" is dragged."),"#df9fdf")
							getGrid(0,fight.petal[i].x,fight.petal[i].y).replaceWith(createGrid(0,fight.petal[i].x,fight.petal[i].y,"Empty",1,0))
							fight.petal[i].y--
							fight.petal[i].print()
						}
					}
					this.attack()
				}
				if(this.name==="!Queen Ant!") {
					let eggCount=0,pendingPlace=new Array()
					for(let i=fight.mob.length-1;i>=0;i--) if(fight.mob[i].name==="Ant Egg") {
						eggCount++
						if(eggCount>2) {
							fight.mob[i].currenthealth=0
							fight.mob[i].remove()
						}
					}
					for(let i=1;i<=3;i++) {
						for(let j=1;j<=8;j++) {
							for(let k=4;k<=6;k++) if(!getFilledGrid(j,k)) pendingPlace.push({x:j,y:k})
						}
						let resultingPlace=pendingPlace[roll(0,pendingPlace.length-1)]
						fight.mob.push(new Mob("Ant Egg",0,0))
						fight.mob[fight.mob.length-1].x=resultingPlace.x
						fight.mob[fight.mob.length-1].y=resultingPlace.y
						fight.mob[fight.mob.length-1].print()
					}
					this.attack()
				}
			} else if(this.behavior==="Neutral+" || this.behavior==="Hostile") {
				this.attack()
			}
			await waitConfirmation()
			if(this.currenthealth<=0 && this.count<=1) return
			await waitAnimation()
			missileCheck()
			await waitMissile()
			if(MobAttributeList[this.id].match("Doesn't move")===null) {
				this.move()
			}
			if(MobAttributeList[this.id].match("BOSS")!==null) {
				delete this.effect.quickness
			}
			updateT()
		}
		Mob.prototype.move=function(dir) {
			if(MobAttributeList[this.id].match("Doesn't move")!==null) return
			if(dir!==undefined) {
				if(this.y+dy[dir]>=1 && this.y+dy[dir]<=3 && !getFilledGrid(toCord(this.x+dx[dir]),this.y+dy[dir])) {
					getGrid(0,this.x,this.y).replaceWith(createGrid(0,this.x,this.y,"Empty",1,0))
					this.x=toCord(this.x+dx[dir])
					this.y=toCord(this.y+dy[dir])
					this.print()
				}
				return
			}
			let pendingCord=new Array(),distanceLimit=1,originX=this.x,originY=this.y
			pendingCord.push({x:originX,y:originY})
			if(MobAttributeList[this.id].match(/(?<=Moves up to )\d/)!==null) distanceLimit=parseInt(MobAttributeList[this.id].match(/(?<=Moves up to )\d/))
			for(let i=1;i<=8;i++) for(let j=1;j<=3;j++) if(discalc(i,this.x)+discalc(j,this.y,0)<=distanceLimit && !getFilledGrid(i,j)) pendingCord.push({x:i,y:j})
			let resultingCord=pendingCord[roll(0,pendingCord.length-1)]
			if(this.x===resultingCord.x && this.y===resultingCord.y) return
			getGrid(0,this.x,this.y).replaceWith(createGrid(0,this.x,this.y,"Empty",1,0))
			this.x=resultingCord.x
			this.y=resultingCord.y
			this.print()
		}
		Mob.prototype.attack=async function() {
			if(this.name.match("(Missile)")===null) {
				addLog("[Mob] "+translateText("Attack of ","EN")+translateText(this.name)+translateText("的攻击","CH")+"...","#bfbf00")
				fight.mobattack=true
				confirmation=true
			} else {
				addLog("[Mob] "+translateText(this.origin.name)+translateText(" shoots a missile."),"#bfbf00")
			}
			let attackFlag=true
			if(this.name.match("(Missile)")===null && MobAttributeList[this.id].match("ATTACK")!==null) {
				attackFlag=false
				if(this.name==="Dandelion") {
					if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
						this.injure(this.damage,"Reflection")
					} else {
						let shootingMissile=this.clone()
						shootingMissile.origin=this
						shootingMissile.name+=" (Missile)"
						shootingMissile.dodge=20
						fight.missile.push(shootingMissile)
					}
				}
				if(this.name==="Hornet") {
					if(determine(50,true," for shoot")) {
						if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
							this.injure(this.damage,"Reflection")
						} else {
							let shootingMissile=this.clone()
							shootingMissile.origin=this
							shootingMissile.name+=" (Missile)"
							shootingMissile.dodge=30
							fight.missile.push(shootingMissile)
						}
					} else {
						attackFlag=true
					}
				}
				if(this.name==="Cactus") {
					if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
						this.injure(this.damage,"Reflection")
					} else {
						let shootingMissile=this.clone()
						shootingMissile.origin=this
						shootingMissile.name+=" (Missile)"
						shootingMissile.dodge=50
						fight.missile.push(shootingMissile)
					}
				}
				if(this.name==="Scorpion") {
					if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
						this.injure(approx(this.damage/2),"Reflection")
					} else {
						let shootingMissile=this.clone()
						shootingMissile.origin=this
						shootingMissile.name+=" (Missile)"
						shootingMissile.damage=approx(shootingMissile.damage/2)
						shootingMissile.dodge=50
						fight.missile.push(shootingMissile)
					}
				}
				if(this.name==="Jellyfish") {
					if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
						this.injure(this.damage,"Reflection")
					} else {
						flowerInjure(this.damage,"Lightning")
					}
				}
				if(this.name==="Leech") {
					flowerInjure(this.damage,"Leech",this)
				}
				if(this.name==="Wasp") {
					if(determine(80,true," for shoot")) {
						if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
							this.injure(this.damage,"Reflection")
						} else {
							let shootingMissile=this.clone()
							shootingMissile.origin=this
							shootingMissile.name+=" (Missile)"
							shootingMissile.dodge=30
							fight.missile.push(shootingMissile)
						}
					} else {
						attackFlag=true
					}
				}
				if(this.name==="Mantis") {
					if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
						this.injure(approx(this.damage/2),"Reflection")
					} else {
						for(let i=1;i<=3;i++) {
							let shootingMissile=this.clone()
							shootingMissile.origin=this
							shootingMissile.name+=" (Missile)"
							shootingMissile.damage=approx(shootingMissile.damage/2)
							shootingMissile.dodge=10
							fight.missile.push(shootingMissile)
						}
					}
				}
				if(this.name==="!Hornet!") {
					if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
						this.injure(this.damage,"Reflection")
					} else {
						for(let i=1;i<=3;i++) {
							let shootingMissile=this.clone()
							shootingMissile.origin=this
							shootingMissile.name+=" (Missile)"
							shootingMissile.dodge=40
							fight.missile.push(shootingMissile)
						}
					}
				}
				if(this.name==="!Leech!") {
					if(!this.effect.lifesteal) this.effect.lifesteal=this.damage
					flowerInjure(this.damage,"!Leech!",this)
					this.effect.lifesteal+=approx(this.damage/5)
				}
				if(this.name==="!Mantis!") {
					if(getTalentLevel(16)>0 && determine(TalentXList[16][getTalentLevel(16)],true," for reflect")) {
						this.injure(approx(2/3*this.damage),"Reflection")
					} else {
						for(let i=1;i<=3;i++) {
							let shootingMissile=this.clone()
							shootingMissile.origin=this
							shootingMissile.name+=" (Missile)"
							shootingMissile.damage=approx(2/3*shootingMissile.damage)
							shootingMissile.dodge=30
							fight.missile.push(shootingMissile)
						}
					}
				}
			}
			if(attackFlag) {
				if(this.name.match("(Missile)")===null) getGrid(0,this.x,this.y).children[1].style.transform="rotate(180deg)"
				confirmation2=true
				operPrepare(this,"Defend")
				updateT()
				await waitConfirmation2()
			}
			if(this.name.match("(Missile)")===null) {
				fight.mobattack=false
				confirmation=false
				updateT()
			}
			if(this.name.match("(Missile)")!==null) missileCheck()
		}
	</script>
	<script>
		const bookHTML=new Object()
		bookHTML["Flower Artisan Guide"]="<h2>Flower Artisan Guide</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>Combine or refine common petals into powerful new forms. By combining different petals with similar characteristics, you gain stronger one improved in level, giving stronger damaging attributes. By refining petal with high level, you gain stronger one improved in rarity, guaranting better durability and wear resistance. Be proficient in the two production methods, and you can easily overwhelm your opponents during battles. This book is your guide to mastering the art of petal craft.</span><br><span>For Rarity Up, you only need to select 1 petal with positive Level (and Rarity should not be Mythic). Higher Level increases the success chance and higher Rarity decreases the chance. The chance is always 100% for petal with at least 4 Level. However, you may find it not worth in some cases. Higher rarity grants your petal higher Health but Damage might be significant decreased since <span class='bold'>Rarity Up resets Level</span>.</span><br><span>For Level Up, you need to select at least 2 petals of the same type with identical Rarity and Level. The success chance decreases as Rarity and Level increases, and the decay stops after 3 Level. To increase the success chance, you need to put more petals at once. (X+1) petals grants you (X+1) times success chance. However, success chance exceeds 100% does nothing, and you lost all petals when success or lost [1,X] petals when fail, so putting all petals together is not a wise decision.</span><br><span>Before you begin, there's one more thing to remind you: The Base Four Influencing Fators (Speed, Reload, ATKBuff, DEFBuff) is <span class='bold'>kept</span> on Rarity Up. On Level Up, they <span class='bold'>independently inherit</span> from one material. Choose your materials wisely! Here is another multifunctional calculator which is quite convenient to use by simply inputting Rarity and Level. 3 0 or 4 2 for example.</span><input type='text' tabindex='-1' id='craft-detail' onkeydown='craftdetail(event.key)' class='inner-input' list='craftdetaillist' autocomplete='off' title='Craft Detail'><datalist id='craftdetaillist'><option value='3 0'><option value='4 2'></datalist>"
		bookHTML["Flower Combat Guide"]="<h2>Flower Combat Guide</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>When you enter a map for the first time, mobs will be spawned and fight against you. There is a threshold depends on Floor that prevents too many mobs existing at the same time. Therefore, when you defeat a mob, a new mob may spawn. Mob summoned by other mob does not count.</span><br><span>The cyan vertical bar on the left represents your energy. When you enter a map, the Health and Damage of your petals will be multiplied by Energy. You will die instantly if Energy is lower than 50%. After defeating mobs in Jungle Gate, you enter the next floor, and recover (5+Floor)% Energy.</span><br><span>The process of a round in battle is divided into the following parts: At the beginning, your petals gain action based on speed. You can move petals, use them for attack or perform special skills. Then mobs gain action. Mob with action exceeding the threshold will attack and you use petal to defend. If you skip defend or the defend fails, you take the damage. By default value, moving a petal costs 100 action (but requires 200), while using petal attack or special skill costs 200 action. The threshold for mob is 200 action.</span><br><span>Your petals can attack or defend mobs from <span class='bold'>the front or the side column</span>. The success rate of attack is based on petal ATK (atk2 for front row and atk1 for middle row) and mob Dodge. The success rate of defend is based on petal DEF (def2 for back row and def1 for middle row) and mob Dodge. These two formula have significant difference. When the mob is from side column, the formula also uses petal Size. Petal Size is capped at 20, but the best value for side-defending is <span class='bold'>17 to 18 Size</span>.</span><br><span>For shootable petal, the petal ATK in success rate formula becomes Accuracy. For each distance, the Accuracy is decreased by Accuracy Decline.</span><br><span>Since you are facing mobs from all directions and not only from the front, <span class='bold'>the first and last columns are connected</span>, which means that both your petals and mobs can move from the first column to the last column or inverted, and the first and last columns are side columns to each other. The distance between two grids is calculated by horizontal distance plus vertical distance <span class='bold'>without using the Pythagorean theorem</span>. If you are defeated, you lost all loots from the fight.</span><br><span>You can calculate chance in the following box. For example, Aa-48S12 calculates the success rate of attacking 80% Dodge mob in side column with 12 Size, 100% ATK and -4 ATKbuff petal, A4+a6F calculates the success rate of attacking 60% Dodge mob in the front column with 40% ATK and +10 ATKbuff petal, D3+05F calculates the success rate of defending 50% Dodge mob in the front column with 30% DEF and +0 DEFbuff petal.</span><input type='text' tabindex='-1' id='combat-calc' onkeydown='combatcalc(event.key)' class='inner-input' list='calclist' autocomplete='off' title='Calculator'><datalist id='calclist'><option value='Aa-48S12'><option value='A4+a6F'><option value='D3+05F'></datalist>"
		bookHTML["Flower Control Guide"]="<h2>Flower Control Guide</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><h3>Hot Keys</h3><div class='green-bg inner-box'><span style='color: #7f7f7f'>S: Open/Close settings</span><span style='color: #7f7f7f'>H: Open/Close help</span><span style='color: #7f7f7f'>Z: Open/Close inventory</span><span style='color: #7f7f7f'>V: Open/Close gallery</span><br><span style='color: #9f9f00'>W=↑: Move up</span><span style='color: #9f9f00'>D=→: Move right</span><span style='color: #9f9f00'>S=↓: Move down</span><span style='color: #9f9f00'>A=←: Move left</span><br><span style='color: #009f9f'>T: End turn (mostly)</span><span style='color: #009f9f'>M: Move</span><span style='color: #009f9f'>R: Attack</span><span style='color: #009f9f'>X: Special actions</span><br><span style='color: #ffffff'>Enter: Confirm</span><span style='color: #ffffff'>Backspace: Cancel</span></div>"
		bookHTML["Flower Environmental Guide"]="<h2 style='color: #ffe65d; filter: brightness(90%); pointer-events: none'>Flower Environmental Guide</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>From now on, the surrounding environment is starting to change and will become <span class='bold'>even worse</span>. Flowers that are not adapted to the environment will face layers of obstacles on their journey, while the mobs that inhabit here can easily cope and even use the environment to strengthen themselves, which will be a huge challenge. The environment are closely related to the region which the map is located. On the way ahead, you should pay attention to changes in the environment and be well prepared. Here are some information related to the environment.</span>"
		bookHTML["Flower Evolutionary Guide"]="<h2>Flower Evolutionary Guide</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>Consume the petals to absorb their vital essence. This raw energy fuels your growth, allowing you to level up and evolve. With each infusion of experience, you grow stronger, gain access to higher tier abilities, naturally ascending to greater heights. This ancient cycle of growth is detailed within these pages.</span><br><span>You gain petals from defeated mobs, higher rarity mobs drops better loots. Different mobs drops various petals, with droprate from tier 1 to tier 5. You can see the detail in gallery. The Experience for a petal is <span class='bold'>(RarityFactor)*(Level+1)</span>. For Common, Unusual, Rare, Epic, Legendary, Mythic Petals, the Factors are 8, 12, 20, 40, 100, 300 respectively.</span><br><span>Since this mechanic is not difficult to understand, you need no calculator for this. I provided another calculator here which helps you get the basic stat of petals. Your gained petals have 20% basic stat attribute floating <span class='bold'>except some special kinds</span>. To use this box, you just need to simply input Name, Rarity, Level. For example, Light 3 0 calculates the stat of Rare Light, Heavy 4 2 calculates the stat of Epic Heavy++.</span><input type='text' tabindex='-1' id='petal-stat' onkeydown='petalstat(event.key)' class='inner-input' list='petalstatlist' autocomplete='off' title='Petal Stat'><datalist id='petalstatlist'><option value='Light 3 0'><option value='Heavy 4 2'></datalist>"
		bookHTML["Flower Game Guide"]="<h2>Flower Game Guide <span style='color: #0078d7; font-style: italic; font-size: 12px; font-weight: noremal'>//TODO</span></h2><div class='white-bg inner-box'><span style='color: #008000'>#include&lt;PFLFtools.h&gt; <span style='color: #0078d7; font-style: italic;'>//should be replaced</span></span><span style='color: #008000'>#include&lt;iostream&gt;</span><span style='color: #008000'>#include&lt;time.h&gt;</span><span style='color: #008000'>#include&lt;math.h&gt;</span><span style='color: #008000'>#include&lt;string.h&gt;</span><span style='color: #008000'>#include&lt;fstream.h&gt;</span><span><span style='font-weight: bold'>using namespace</span> std<span style='color: #ff0000; font-weight: bold'>;</span></span><span><span style='font-weight: bold'>void</span> menu<span style='color: #ff0000; font-weight: bold'>()</span></span><span style='color: #ff0000; font-weight: bold'>{</span><span style='margin-left: 2em'>system<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #0000ff; font-weight: bold'>\"cls\"</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>slowprint<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #0000ff; font-weight: bold'>\"↓MORE GAME (CLICK!)↓\"</span><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>slowprint<span style='color: #ff0000; font-weight: bold'>(</span><a href='https://6triple6single.github.io/PFLF' target='_blank' style='color: #0000ff; font-weight: bold; text-decoration: none'>\"PFLF\"</a><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>slowprint<span style='color: #ff0000; font-weight: bold'>(</span><a href='https://6triple6single.github.io/Virus1' target='_blank' style='color: #0000ff; font-weight: bold; text-decoration: none'>\"VIRUS 1\"</a><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'><span style='font-weight: bold'>return</span><span style='color: #ff0000; font-weight: bold'>;</span></span><span style='color: #ff0000; font-weight: bold'>}</span><span><span style='font-weight: bold'>int</span> main<span style='color: #ff0000; font-weight: bold'>()</span></span><span style='color: #ff0000; font-weight: bold'>{</span><span style='margin-left: 2em'>system<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #0000ff; font-weight: bold'>\"cls\"</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>Sleep<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #800080'>2000</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='color: #0078d7; font-style: italic; margin-left: 2em'>// loadtext();</span><span style='color: #0078d7; font-style: italic; margin-left: 2em'>// loadgallery();</span><span style='color: #0078d7; font-style: italic; margin-left: 2em'>// loadmarvel();</span><span style='margin-left: 2em'>menu<span style='color: #ff0000; font-weight: bold'>();</span></span><span style='margin-left: 2em'><span style='font-weight: bold'>return</span> <span style='color: #800080'>0</span><span style='color: #ff0000; font-weight: bold'>;</span></span><span style='color: #ff0000; font-weight: bold'>}</span></div>"
		bookHTML["Flower Survival Guide"]="<h2>Flower Survival Guide</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>Welcome to the Florroom! This is a tower with 8 floors. The goal of the game is to climb from Floor 1 to Floor 7. Here, you make powerful petals, travel between different regions and maps, defeat various mobs and continuously upgrade to gain stronger power!</span><br><span>This is your first book. As the story continues, you will learn more knowledge, which appears in the form of books in this section. If you don't have experience fighting in Florroom, it doesn't matter. You are able to get <span class='bold'>Flower Combat Guide</span> and <span class='bold'>Flower Terminology Guide</span> I wrote. Enter the name of this book below to get it!</span><br><span>If you remembered something, try writing in the following box to retrieve the corresponding item:</span><input type='text' tabindex='-1' id='item-code' onkeydown='itemcode(event.key)' class='inner-input' autocomplete='off' title='Code'><span>(NOt CASe SenSItiVE &amp; ign o r i ngspace s)</span>"
		bookHTML["Flower Talent Guide"]="<h2 style='color: #7eef6d'>Flower Talent Guide</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>Reawaken the potential power you lost. As you have reactivated your talent, you can enhance your various innate abilities by investing in talent points obtained through leveling up. Beware, the path is not fixed. You may respec your choices and retrieve your talent points, but with each reshaping there will be <span class='bold'>a growing cost</span>. Please think twice before starting.</span><br><span>Purchase STA1~3 to start. You can purchase nodes connected with branches, which are colored yellow.</span>"
		bookHTML["Flower Terminology Guide"]="<h2>Flower Terminology Guide</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><h3>Rarity</h3><span style='color: #000000'>0=None</span><span style='color: #7eef6d'>1=Common</span><span style='color: #ffe65d'>2=Unusual</span><span style='color: #ffe65d; filter: brightness(90%)'>(2)=Unusual</span><span style='color: #4d52e3'>3=Rare</span><span style='color: #861fde'>4=Epic</span><span style='color: #de1f1f'>5=Legendary</span><span style='color: #1fdbde'>6=Mythic</span><span style='color: #ff2b75'>7=Ultra</span><span style='color: #2bffa3'>8=Super</span><span style='color: #2bffa3; filter: brightness(90%)'>(8)=Super</span><span style='color: #555555'>9=Unique</span><h3>Petal Stats</h3><span><span class='bold'>Health</span>: How much damage your petal can take before destroyed.</span><span><span class='bold'>Damage</span>: How much damage your petal can deal.</span><span><span class='bold'>Size</span>: Size is a number between 1 and 20, which affects side attack/defend accuracy. The effective ATK/DEF percentage is decreased by (18-size)(17-size)/2 in side attack/defend.</span><span><span class='bold'>Speed</span>: How much actionbar your petal gain each turn.</span><span><span class='bold'>Reload</span>: How much actionbar you need to reload petal.</span><span><span class='bold'>Actionbar</span>: Your petals gain actionbar when flower turn starts. Actionbar can be used to reload petal, move petal or attack with petal. Some petal skill costs actionbar.</span><span><span class='bold'>ATK</span>: The attack accuracy of petal. Only petal with positive ATK can be used to attack. ATK1 (before arrow) determines the attack accuracy in middle row, while ATK2 (after arrow) determines the attack accuracy in front row.</span><span><span class='bold'>DEF</span>: The defend accuracy of petal. Only petal with positive DEF can be used to defend. DEF1 (before arrow) determines the defend accuracy in middle row, while DEF2 (after arrow) determines the defend accuracy in back row.</span><span><span class='bold'>ATKbuff</span>: ATKbuff is a number between -10 and 10, which affects effective attack accuracy percentage. Petal with less than 5 ATKbuff will receive an extra nerf when attacking mobs in side column.</span><span><span class='bold'>DEFbuff</span>: DEFbuff is a number between -10 and 10, which affects effective defend accuracy percentage. Petal with less than 5 DEFbuff will receive an extra nerf when defending mobs in side column.</span><span><span class='bold'>Attribute Float</span>: The Health/Damage/Speed/Reload attribute of petal has 20%/20%/10%/10% floating value. The <span class='bold'>BEST/GOOD/AVG/WEAK/FAIL</span> determines how good the attribute is. Lower reload is better.</span><br><h3>Mob Stats</h3><span><span class='bold'>Passive</span>: The mob will not attack you by default.</span><span><span class='bold'>Neutral</span>: The mob will not attack you before receiving damage from petal. Neutral mobs have 30% probability to become hostile before action.</span><span><span class='bold'>Neutral+</span>: Neutral mob which became hostile.</span><span><span class='bold'>Hostile</span>: The mob will attack you when action.</span><span><span class='bold'>Health</span>: How much damage the mob can take before destroyed.</span><span><span class='bold'>Damage</span>: How much damage the mob can deal.</span><span><span class='bold'>Dodge</span>: The accuracy of mob, also reduces chance to be hit.</span><span><span class='bold'>Speed</span>: How much actionbar the mob gain each turn.</span><span><span class='bold'>Actionbar</span>: Mobs gain actionbar when mob turn starts. Mob action costs 200 actionbar.</span><br><h3>Petal Affix</h3><span><span class='bold'>Affix</span>: The properties or skills attached to petals. Only depends on petal kind.</span><span><span class='bold'>Part</span>: The petal has multiple parts. Petal losts 1 part instead of destroyed when health reaches 0, exceeding damage is canceled.</span><span><span class='bold'>Petal attribute</span>: The inherent properties of petals. It may even affect petals in inventory.</span><span><span class='bold'>When equipped</span>: Special impact which only happens once at start of fight.</span><span><span class='bold'>While exist</span>: Persistent effect when the petal is reloaded.</span><span><span class='bold'>When attack</span>: The side effects of attack.</span><span><span class='bold'>When defend</span>: The side effects of defend.</span><span><span class='bold'>When attack or defend</span>: The side effects of both attack and defend.</span><span><span class='bold'>When shoot</span>: The petal is shootable. The detail is listed in Flower Combat Guide.</span><span><span class='bold'>Special skill</span>: The special skill of petal.</span><span><span class='bold'>At end of turn</span>: The effects when flower turn ends.</span><span><span class='bold'>When destroyed a part</span>: Things will happen when a part of petal is destroyed except the last part.</span><span><span class='bold'>When destroyed</span>: Things will happen when a petal is fully destroyed. Attribute reset will reset some nerf/buff on petal by other affixes of the same petal.</span><br><span><span class='bold' style='color: #bf00bf; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Poison</span>: The petal can deal poison damage, which is a special type of damage.</span><span><span class='bold' style='color: #7fffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Lightning</span>: The petal can deal lightning damage, which is a special type of damage.</span><span>Sign of numerical values in affix: <span class='bold' style='color: #7fdf7f; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Health</span>, <span class='bold' style='color: #ff7f7f; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Damage</span>, <span class='bold' style='color: #00dfff; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Rarity</span>, <span class='bold' style='color: #9f5fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Level</span></span><br><h3>Mob Affix</h3><span><span class='bold'>Boss</span>: Boss mob gains quickness when receiving damage from petal. Quickness will be reset to 0 after action.</span><span><span class='bold'>Lives</span>: The mob has more than 1 live. Mob losts 1 live instead of destroyed when health reaches 0, exceeding damage is canceled. Also called <span class='bold'>part</span>.</span><span><span class='bold'>Mob attribute</span>: The inherent properties of mobs.</span><span><span class='bold'>While exist</span>: Persistent effect when the mob is alive.</span><span><span class='bold'>Mob action</span>: The mob may not use the default action.</span><span><span class='bold'>When attack</span>: The side effects of attack.</span><span><span class='bold'>Characteristic</span>: Something related to damage result.</span><span><span class='bold'>When destroyed a part</span>: Things will happen when a part of mob is destroyed except the last part.</span><span><span class='bold'>When destroyed</span>: Things will happen when a mob is fully destroyed.</span><br><span><span class='bold' style='color: #bf00bf; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Poison</span>: The mob can deal poison damage, which is a special type of damage.</span><span><span class='bold' style='color: #7fffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Lightning</span>: The mob can deal lightning damage, which is a special type of damage.</span><span>Sign of numerical values in affix: <span class='bold' style='color: #7fdf7f; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Health</span>, <span class='bold' style='color: #ff7f7f; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>Damage</span>"

		let logDisplay=true,cleanerDegree=0
		function cleanerRotate(force=false) {
			if(cleanerDegree===0 && force===false) return
			cleanerDegree=(cleanerDegree+3)%270
			document.getElementById("cleaner").style.transform="rotate("+cleanerDegree+"deg)"
		}
		function addLog(text,color="#000000") {
			if(text.startsWith("[Help]") && player.settings.closehelplog===true) return
			if(text.startsWith("[Command]") && player.settings.closecommandlog===true) return
			if(text.startsWith("[Chat]") && player.settings.closechatlog===true) return
			if(text.startsWith("[Warning]") && player.settings.closewarninglog===true) return
			if(text.startsWith("[Code]") && player.settings.closecodelog===true) return
			if(text.startsWith("[Calculator]") && player.settings.closecalculatorlog===true) return
			if(text.startsWith("[bot#7976]") && player.settings.closebotlog===true) return
			if(text.startsWith("[Petal]") && player.settings.closepetallog===true) return
			if(text.startsWith("[Mob]") && player.settings.closemoblog===true) return
			if(text.startsWith("[Flower]") && player.settings.closeflowerlog===true) return
			if(text.startsWith("[Turn]") && player.settings.closeturnlog===true) return
			if(text.startsWith("[Determine]") && player.settings.closedeterminelog===true) return
			if(text.startsWith("[Resource]") && player.settings.closeresourcelog===true) return
			if(text.startsWith("[Loot]") && player.settings.closelootlog===true) return
			if(text.startsWith("[Craft]") && player.settings.closecraftlog===true) return
			text=text.replace(/(?<=^\[).+?(?=\])/,(content)=>translateText(content))
			let logElement=document.createElement("div")
			logElement.setAttribute("class","lcmargin")
			if(color) logElement.style.color=color
			logElement.innerHTML=text
			document.getElementById("log").appendChild(logElement)
			document.getElementById("log").scrollTop=document.getElementById("log").scrollHeight
		}
		async function cleanLog() {
			if(cleanerDegree>0) return
			document.getElementById("log").innerHTML=""
			cleanerRotate(true)
		}
		function expandLog() {
			if(logDisplay) {
				logDisplay=false
				document.getElementById("log").style.display="none"

				document.getElementById("command").style.width="unset"
				document.getElementById("expander").children[1].style.display="unset"
			} else {
				logDisplay=true
				document.getElementById("log").style.display=""
				document.getElementById("command-call").style.display=""
				document.getElementById("cleaner").style.display=""
				document.getElementById("command").style.width=""
				document.getElementById("expander").children[1].style.display=""
			}
		}

		function determine(chance,log,logText="") {
			if(chance<0) chance=0
			if(chance>100) chance=100
			let result=false
			if(100*Math.random()<=chance) result=true
			if(log) {
				if(result) {
					addLog("[Determine] "+translateText("True ")+"("+betterFloor(chance)+"%)"+translateText(logText),"#3f3f3f")
				} else {
					addLog("[Determine] "+translateText("False ")+"("+(100-betterFloor(chance))+"%)"+translateText(logText),"#3f3f3f")
				}

		function toCord(originCord,modulo=8) {

		function discalc(cord1,cord2,modulo=8) {
			let differ=Math.abs(cord1-cord2)
			if(modulo===0) return differ
			differ%=modulo
			if(modulo-differ<differ) differ=modulo-differ
			return differ
		}
		function compareVectorCloser(v1,v2) {
			if(v1.x**2+v1.y**2<v2.x**2+v2.y**2) return true
			if(v1.x**2+v1.y**2>v2.x**2+v2.y**2) return false
			let dir1=0,dir2=0
			if(v1.x===0&&v1.y<0) dir1=1
			if(v1.x>0) dir1=2
			if(v1.x===0&&v1.y>0) dir1=3
			if(v1.x<0) dir1=4
			if(v2.x===0&&v2.y<0) dir2=1
			if(v2.x>0) dir2=2
			if(v2.x===0&&v2.y>0) dir2=3
			if(v2.x<0) dir2=4
			if(dir1<dir2) return true
			if(dir1>dir2) return false
			return (v1.y/v1.x<v2.y/v2.x)
		}

		let ladybugDegree=roll(0,359),ladybugMovement=0,ladybugTurn=1,ladybugX=roll(0,99),ladybugY=roll(0,99)
		function ladybugMove() {
			if(document.getElementById("gallery").style.display==="flex") {
				if(ladybugMovement===0) {
					ladybugTurn=roll(0,10)
					if(ladybugTurn>=1 && ladybugTurn<=9) ladybugTurn=roll(0,10)
					if(ladybugTurn>=1 && ladybugTurn<=5) ladybugTurn=roll(0,10)
					if(ladybugTurn>=1 && ladybugTurn<=3) ladybugTurn=roll(0,10)
					if(ladybugTurn>=1 && ladybugTurn<=2) ladybugTurn=roll(0,10)
					if(dice()<4) ladybugTurn*=-1
				}
				if(ladybugMovement<180 && roll(1,90)*Math.abs(ladybugTurn)>Math.abs(90-ladybugMovement)*10) {
					ladybugDegree=(ladybugDegree+Math.sign(ladybugTurn)+360)%360
					document.getElementById("ladybug").style.transform="rotate("+ladybugDegree+"deg)"
				}
				if(ladybugMovement>=180 && roll(1,90)*Math.abs(ladybugTurn)>Math.abs(270-ladybugMovement)*10) {
					ladybugX=(ladybugX+Math.sin(ladybugDegree/180*Math.PI)+100)%100
					ladybugY=(ladybugY-Math.cos(ladybugDegree/180*Math.PI)+100)%100
					document.getElementById("ladybug-bg").style.transform="translate(-"+ladybugX+"px, -"+ladybugY+"px)"
				}
				ladybugMovement=(ladybugMovement+1)%360
			}
		}

		function encodeFile(savestr) {
			if(savestr.length%2>0) savestr+="79.76"
			let encodedstr=""
			for(let i=0;i<savestr.length/2;i++) {
				let encodeValue=(savestr[2*i].charCodeAt()-20)*130+(savestr[2*i+1].charCodeAt()-20)
				encodedstr+=String.fromCharCode(65+betterFloor(encodeValue/676))
				encodedstr+=String.fromCharCode(65+betterFloor(encodeValue/26)%26)
				encodedstr+=String.fromCharCode(65+encodeValue%26)
			}
			for(let i=0;i<encodedstr.length;i++) {
				encodedstr=encodedstr.slice(0,i)+String.fromCharCode(65+(encodedstr[i].charCodeAt()+65+betterFloor((i+1)/(encodedstr.length+1)*354233654)%26)%26)+encodedstr.slice(i+1)
			}
			return encodedstr
		}
		function decodeFile(encodedstr) {
			let savestr=""
			for(let i=0;i<encodedstr.length;i++) {
				encodedstr=encodedstr.slice(0,i)+String.fromCharCode(65+(encodedstr[i].charCodeAt()+65-betterFloor((i+1)/(encodedstr.length+1)*354233654)%26)%26)+encodedstr.slice(i+1)
			}
			for(let i=0;i<encodedstr.length/3;i++) {
				let encodeValue=(encodedstr[3*i].charCodeAt()-65)*676+(encodedstr[3*i+1].charCodeAt()-65)*26+(encodedstr[3*i+2].charCodeAt()-65)
				savestr+=String.fromCharCode(20+betterFloor(encodeValue/130))
				savestr+=String.fromCharCode(20+encodeValue%130)
			}
			if(savestr[savestr.length-1]==="6") savestr=savestr.slice(0,-5)
			return savestr
		}
		function importSave() {
			if(animation) return
			document.querySelectorAll("input[type='file']").forEach(input => input.remove())
			let fileInput=document.createElement("input")
			fileInput.type="file"
			fileInput.accept=".txt"
			fileInput.style.display="none"
			fileInput.addEventListener("change",function(e) {
				let savefile=e.target.files[0]
				if(!savefile) {
					document.body.removeChild(fileInput)
					return
				}
				let reader=new FileReader()
				reader.onload=async function(event) {
					try {
						savefile=JSON.parse(decodeFile(event.target.result))
						if(!(savefile.player&&savefile.explore&&savefile.fight)) throw new Error()
						if(savefile.player.hasOwnProperty("memory")) {
							savefile.player.memory--
						} else {
							savefile.player.memory=3
						}
						if(savefile.player.memory<0) {
							alert(translateText("Error: Memory is broken"))
							return
						}
						clearAllInterval()
						localStorage.setItem("FLORROOMLplayer",JSON.stringify(savefile.player))
						localStorage.setItem("FLORROOMLexplore",JSON.stringify(savefile.explore))
						localStorage.setItem("FLORROOMLfight",JSON.stringify(savefile.fight))
						document.getElementById("end1").style["pointer-events"]="unset"
						for(let i=0;i<=10;i++) {
							document.getElementById("end1").style.opacity=i/10
							await delay(100)
						}
						safeReload()
					} catch {
						document.body.removeChild(fileInput)
						alert(translateText("Error: Memory incomplete"))
					}
				}
				reader.readAsText(savefile)
			} )
			document.body.appendChild(fileInput)
			fileInput.click()
		}
		async function exportSave() {
			if(animation) return
			animation=true
			if(player.hasOwnProperty("memory")) player.memory--
			let savefile={player:player,explore:explore,fight:fight}
			if(player.hasOwnProperty("memory")) player.memory++
			let blob=new Blob([encodeFile(JSON.stringify(savefile))],{type:"text/plain"})
			let downloadElement=document.createElement("a")
			downloadElement.href=URL.createObjectURL(blob)
			if(player.memory===0) {
				downloadElement.download="broken memory.txt"
			} else {
				downloadElement.download="memory.txt"
			}
			downloadElement.click()
			document.getElementById("export-btn").innerHTML=translateText("Memories Stored!")
			await delay(1000)
			document.getElementById("export-btn").innerHTML=translateText("Store Memories")
			if(player.hasOwnProperty("memory")) document.getElementById("export-btn").innerHTML+=" ("+player.memory+")"
			animation=false
		}
		async function hardReset() {
			if(animation) return
			let getResetSentence=prompt(translateText("Are you sure to reset the game and lost all process?\nType 'The game is perfect, there are no bugs' to confirm."))
			if(getResetSentence!=="The game is perfect, there are no bugs") return
			clearAllInterval()
			for(let i=0;i<=50;i++) {
				document.getElementById("end1").style.opacity=i/50
				await delay(100)
			}
			document.getElementById("end1").style["pointer-events"]="unset"
			let saveSettings=player.settings
			player=new Object()
			player.settings=saveSettings
			setPlayer()
			player.savesettings=structuredClone(player.settings)
			localStorage.removeItem("FLORROOMLexplore")
			localStorage.removeItem("FLORROOMLfight")
			document.getElementById("end2").innerText=translateText("The story of the Florroom continues...")
			for(let i=0;i<=20;i++) {
				document.getElementById("end2").style.opacity=i/20
				await delay(100)
			}
			await delay(1000)
			for(let i=0;i<=20;i++) {
				document.getElementById("end2").style.opacity=1-i/20
				await delay(100)
			}
			document.getElementById("end2").innerText=translateText("Forever.")

				await delay(100)
			}
			await delay(2000)
			for(let i=0;i<=20;i++) {
				document.getElementById("end2").style.opacity=1-i/20
				await delay(100)
			}
			await delay(3000)
			safeReload()
		}

		function getDir(validArray,dir,oldPlaceX,oldPlaceY,placeX=8,placeY=6) {
			if(getGrid(0,oldPlaceX,oldPlaceY)===null) {
				oldPlaceX=0
				oldPlaceY=0
			}
			if(oldPlaceX===0 && selectedGrid.value===0) {

				oldPlaceY=selectedGrid.y
			}

			if(player.settings.strictvertical===true) searchStep=placeX

			if(pathArray.indexOf(cord1*100+cord2)===-1 && pathArray.indexOf(cord2*100+cord1)===-1) return -1
			let disx=getSpotCord(cord2).x-getSpotCord(cord1).x,disy=getSpotCord(cord2).y-getSpotCord(cord1).y,disv=(disx*disx+disy*disy)**0.5+20

			let distancePassed=(Date.now()-flowerMoveStartTime)/100/scaledDistance(explore.floweroldspot,explore.flowerspot)

		function readyFight() {
			if(fight.petal.length!==FlowerSlot()) return
			addLog("[bot#7976] "+translateText("Good luck with that!"),"#7f7fff")
			if(fight.environment===5) {
				fight.environmentdetail=new Array()
				fight.environmentdetail[0]=false
				for(let i=1;i<=4;i++) fight.environmentdetail[i]=determine(50)
			} else if(fight.environment===15) {
				fight.environmentdetail=new Array()
				fight.environmentdetail[0]=false
				for(let i=1;i<=4;i++) fight.environmentdetail[i]=determine(80)
			}
			if(getTalentLevel(13)>0 && determine(TalentXList[13][getTalentLevel(13)],true," for accurate attack")) {
				flowerHeal({effectturn:1},"Accuracy")
			}
			if(fight.environment===5 || fight.environment===15) {
				if(getTalentLevel(11)>0 && determine(TalentXList[11][getTalentLevel(11)],true," for clear")) {
					addLog("[Flower] "+translateText("All negative effects cleared."),"#00bfbf")
					for(let i=0;i<=4;i++) fight.environmentdetail[i]=false
				}
			}
			fight.ready=true
			openInventory(false)
			spawnMob()
			for(let i=0;i<fight.petal.length;i++) {
				fight.petal[i].origin=fight.petal[i].origin.clone()
				fight.petal[i].origin.health=approx(fight.petal[i].origin.health*fight.energy/10000)
				fight.petal[i].origin.damage=approx(fight.petal[i].origin.damage*fight.energy/10000)
				fight.petal[i].health=fight.petal[i].origin.health
				fight.petal[i].damage=fight.petal[i].origin.damage
			}
			for(let i=0;i<fight.petal.length;i++) {
				fight.petal[i].currenthealth=fight.petal[i].health
				fight.petal[i].state="Existing"
				fight.petal[i].actionbar=0
				fight.petal[i].progress()
				if(fight.petal[i].name==="Cactus") {
					if(!fight.flower.effect.hasOwnProperty("bloom")) fight.flower.effect.bloom={buff:0}
					fight.flower.effect.bloom.buff+=approx(10/3*fight.petal[i].health)
				}
				if(fight.petal[i].name==="Salt") {
					if(!fight.flower.effect.hasOwnProperty("thorn")) fight.flower.effect.thorn={buff:0}
					fight.flower.effect.thorn.buff=60+10*fight.petal[i].rarity
				}
				if(fight.petal[i].name==="Root") {
					if(!fight.flower.effect.hasOwnProperty("resistance")) fight.flower.effect.resistance={buff:0}
					fight.flower.effect.resistance.buff=approx(fight.petal[i].health/10)
				}
			}
			if(getTalentLevel(2)>0) {
				if(!fight.flower.effect.hasOwnProperty("purity")) fight.flower.effect.purity={buff:0}
				fight.flower.effect.purity.buff+=TalentXList[2][getTalentLevel(2)]
			}
			if(getTalentLevel(3)>0) {
				if(!fight.flower.effect.hasOwnProperty("resistance")) fight.flower.effect.resistance={buff:0}
				fight.flower.effect.resistance.buff+=TalentXList[3][getTalentLevel(3)]
			}
			let reloadPercentage=100,sizeExpansion=0
			for(let i=0;i<fight.petal.length;i++) {
				if(fight.petal[i].name==="Soil") {
					sizeExpansion+=2
				}
			}
			if(getTalentLevel(4)>0) {
				reloadPercentage*=(1-TalentXList[4][getTalentLevel(4)]/100)
			}
			if(getTalentLevel(14)>0) {
				sizeExpansion+=TalentXList[14][getTalentLevel(14)]
			}
			for(let i=0;i<fight.petal.length;i++) {
				if(reloadPercentage<100 && typeof(fight.petal[i].reload)==="number") {
					fight.petal[i].reload=approx(fight.petal[i].reload*reloadPercentage/100)
					fight.petal[i].origin.reload=fight.petal[i].reload
				}
				if(fight.petal[i].size>2) {
					fight.petal[i].size+=sizeExpansion
					if(fight.petal[i].size>20) fight.petal[i].size=20
					fight.petal[i].origin.size=fight.petal[i].size
				}
			}
			fight.flower.health=FlowerMaxHealth()
			fight.flower.currenthealth=FlowerMaxHealth()
			updateFlowerState()
			fight.turn="Flower"
			updateT()
		}
		function endFight(win) {
			if(animation) return
			fight.active=false
			fight.ready=false
			fight.manipulate=false
			selectedGrid.select=false
			operingType="Inactive"
			closeGridInfo()
			if(win!==true) {
				for(let i in player.inventory) if(player.inventory[i].effect.hasOwnProperty("temploot")) {
					delete player.inventory[i]
				}
				setPlayer()
				fight.flower.effect=new Object()
				explore.flowerspot=explore.floweroldspot
				setExplore()
				updateFlowerSpot(true)
				displayMap()
				updateFlowerState()
				return
			}
			for(let i in player.inventory) if(player.inventory[i].effect.temploot===explore.flowerspot) delete player.inventory[i].effect.temploot
			setPlayer()
			explore.explored[explore.flowerspot]=true
			explore.environment[explore.flowerspot]=0
			explore.energy=fight.energy
			if(explore.flowerspot===67) {
				let saveFloor=explore.floor,saveEnergy=explore.energy
				saveEnergy+=(500+100*saveFloor)
				if(saveEnergy>10000) saveEnergy=10000
				explore=new Object()
				explore.floor=saveFloor+1
				explore.energy=saveEnergy
				generateEnvironment()
				setExplore()
				setFight()
				endFloor(saveFloor)
				return
			}
			fight.flower.effect=new Object()
			setExplore()
			displayMap()
			updateFlowerState()
		}

		let operingGrid,operingThing,operingX=0,operingY=0,operingType="Inactive"
		function operCheck(newX,newY) {
			if(operingType==="Move") {
				if(operingThing.name!=="Pearl" && getFilledGrid(newX,newY)) return false
				for(let i=0;i<fight.petal.length;i++) if(fight.petal[i].x===newX && fight.petal[i].y===newY) return false
				if(discalc(operingThing.x,newX)+discalc(operingThing.y,newY,0)!==1) return false
				if(operingThing.name!=="Pearl" && newY<=3) return false
				if(fight.environment===5 || fight.environment===15) {
					for(let i=1;i<=4;i++) if(fight.environmentdetail[i]) {
						if(toCord(operingThing.x+dx[i])===newX && operingThing.y+dy[i]===newY) {
							return false
						}
					}
				}
				return true
			}
			if(operingType==="Attack") {
				for(let i=0;i<fight.mob.length;i++) if(fight.mob[i].x===newX && fight.mob[i].y===newY) {
					if(discalc(operingThing.x,newX)>1) return false
					if(AttackSuccessChance(operingThing,fight.mob[i],"Auto","Auto")>0) {
						updateT()
						return true
					}
					return false
				}
				return false
			}
			if(operingType==="Shoot") {
				for(let i=0;i<fight.mob.length;i++) if(fight.mob[i].x===newX && fight.mob[i].y===newY) {
					if(ShootSuccessChance(operingThing,fight.mob[i])>0) {
						updateT()
						return true
					}
					return false
				}
				return false
			}
			if(operingType==="Skill") {
				if(operingThing.name==="Pollen") {
					if(getFilledGrid(newX,newY)) return false
					if(newY<=3) return false
					if(discalc(operingThing.x,newX)+discalc(operingThing.y,newY,0)>3) return false
					return true
				}
				if(operingThing.name==="Yin Yang") return (newY===operingThing.y)
			}
			if(operingType==="Defend") {
				for(let i=0;i<fight.petal.length;i++) if(fight.petal[i].state==="Existing" && fight.petal[i].x===newX && fight.petal[i].y===newY) {
					if(discalc(operingThing.x,newX)>1) return false
					if(newY<=4 && fight.petal[i].name!=="Pearl") return false
					if(newY<=operingThing.y) return false
					if(DefendSuccessChance(fight.petal[i],operingThing,"Auto","Auto")>0) {
						updateT()
						return true
					}
					return false
				}
				return false
			}
		}

		function operResult() {
			if(animation) return
			if(operingX!==0) {
				if(operingType==="Move") {
					operingThing.actionbar-=moveRequirement(operingThing)
					operingThing.move(operingX,operingY)
				}
				if(operingType==="Attack") {
					operingThing.actionbar-=attackRequirement(operingThing)
					operingThing.attack(operingX,operingY)
				}
				if(operingType==="Shoot") {
					operingThing.shoot(operingX,operingY)
				}
				if(operingType==="Skill") {
					if(fight.environment===10) {

						if(fight.environmentdetail===10) {

						}
					} else if(fight.environment===20) {
						fight.environmentdetail++
						if(fight.environmentdetail===10) {
							fight.environmentdetail=0
							flowerInjure(approx(fight.flower.health/5),"Environment")
						}
					}
					if(operingThing.name==="Pollen") {

						operingThing.actionbar-=skillRequirement(operingThing)
						operingThing.currenthealth-=approx(operingThing.currenthealth/2)
						getGrid(0,operingThing.x,operingThing.y).replaceWith(createGrid(0,operingThing.x,operingThing.y,"Empty",1,0))
						operingThing.x=operingX
						operingThing.y=operingY
						operingThing.print()
						fight.manipulate=false
					}
					if(operingThing.name==="Yin Yang") {
						addLog("[Petal] "+translateText("Petals shifted."),"#9f9fdf")

		function getFilledGrid(targetX,targetY) {
			if(targetY>6) return true
			let filledGrid=new Array()
			for(let i=0;i<fight.petal.length;i++) filledGrid.push(fight.petal[i].x*10+fight.petal[i].y)
			for(let i=0;i<fight.mob.length;i++) filledGrid.push(fight.mob[i].x*10+fight.mob[i].y)
			if(targetX!==undefined) {
				if(filledGrid.indexOf(targetX*10+targetY)===-1) return false
				return true
			}
			return filledGrid
		}
		function fullGrid() {
			let filledGrid=getFilledGrid()
			for(let i=1;i<=8;i++) {
				for(let j=1;j<=3;j++) if(filledGrid.indexOf(10*i+j)===-1) return false
			}
			return true
		}
		function effectiveMobCount() {
			let count=0
			for(let i=0;i<fight.mob.length;i++) if(!fight.mob[i].effect.hasOwnProperty("summoned")) count++
			if(fight.spawnmob.length>0 && fight.spawnmob[0].effect.hasOwnProperty("noloot")) count--
			return count 
		}
		function fillMob() {
			while(fight.spawnmob.length && effectiveMobCount()<FloorCapacity(explore.floor)) {
				if(fullGrid()) return
				addLog("[Mob] "+translateText(fight.spawnmob[0].name)+translateText(" with ","EN")+translateText("生成了，生命值为","CH")+fight.spawnmob[0].health+translateText(" health spawned.","EN")+translateText("。","CH"),"#bfbf00")
				let filledGrid=getFilledGrid()
				filledGrid.push(0)
				fight.mob.push(fight.spawnmob.splice(0,1)[0])
				while(filledGrid.indexOf(fight.mob[fight.mob.length-1].x*10+fight.mob[fight.mob.length-1].y)>=0) {
					fight.mob[fight.mob.length-1].x=roll(1,8)
					fight.mob[fight.mob.length-1].y=roll(1,3)
				}
				fight.mob[fight.mob.length-1].print()
			}
			if(fight.mob.length===0) endFight(true)
		}
		function spawnMob() {
			for(let i=0;i<fight.mob.length;i++) {
				getGrid(0,fight.mob[i].x,fight.mob[i].y).replaceWith(createGrid(0,fight.mob[i].x,fight.mob[i].y,"Empty",1,0))
			}
			fight.mob=new Array()
			fight.spawnmob=new Array()
			if(explore.flowerspot===67) {
				for(let i=0;i<3;i++) fight.spawnmob[i]=new Mob(explore.floorboss[i]+100,BossRarity(explore.floor,i+1))
				fillMob()
				return
			}
			let minSpawn=parseInt(MapDensityList[explore.flowerspot].match(/^\d+/))*FloorDensityMultiplier(explore.floor),maxSpawn=parseInt(MapDensityList[explore.flowerspot].match(/(?<=-)\d+/))*FloorDensityMultiplier(explore.floor)
			let totalSpawn=roll2(minSpawn,maxSpawn)
			for(let i=0;i<totalSpawn;i++) {
				fight.spawnmob[i]=new Mob(MobID(explore.flowerspot),MobRarity(MapWave(explore.floor,MapRarityList[explore.flowerspot])))
			}
			fillMob()
		}
		async function endTurn() {

					flowerHeal({effectturn:1},"Accuracy")

				updateFlowerState()
				if(fight.flower.effect.hasOwnProperty("poison") || fight.flower.effect.hasOwnProperty("suppression") || fight.flower.effect.hasOwnProperty("vulnerability") || fight.environment===5 || fight.environment===15) {
					if(getTalentLevel(11)>0 && determine(TalentXList[11][getTalentLevel(11)],true," for clear")) {

						delete fight.flower.effect.suppression
						delete fight.flower.effect.vulnerability

						updateFlowerState()
					}
				}
				if(fight.flower.effect.hasOwnProperty("poison")) {
					addLog("[Flower] "+translateText("Flower received ")+fight.flower.effect.poison[0]+translateText(" damage from poison."),"#00bfbf")

					if(fight.flower.currenthealth<=0) {
						flowerRetreat()
						return
					}
					fight.flower.effect.poison.splice(0,1)
					if(!fight.flower.effect.poison.length) delete fight.flower.effect.poison
					updateFlowerState()
				}
				if(fight.flower.effect.hasOwnProperty("suppression")) {
					fight.flower.effect.suppression.turn--
					if(!fight.flower.effect.suppression.turn) delete fight.flower.effect.suppression
					updateFlowerState()
				}
				if(fight.flower.effect.hasOwnProperty("vulnerability")) {
					fight.flower.effect.vulnerability.splice(0,1)
					if(!fight.flower.effect.vulnerability.length) delete fight.flower.effect.vulnerability
					updateFlowerState()
				}
				for(let i=0;i<fight.petal.length;i++) if(fight.petal[i].name==="Sponge" && fight.petal[i].effect.hasOwnProperty("stagger")) {
					addLog("[Flower] "+translateText("Flower received ")+ fight.petal[i].effect.stagger[0]+translateText(" damage from stagger."),"#00bfbf")
					fight.flower.currenthealth-=fight.petal[i].effect.stagger[0]
					if(fight.flower.currenthealth<=0) {
						flowerRetreat()
						return
					}
					if(fight.petal[i].effect.hasOwnProperty("stagger")) {
						fight.petal[i].effect.stagger.splice(0,1)
						if(!fight.petal[i].effect.stagger.length) delete fight.petal[i].effect.stagger
					}
					updateFlowerState()
				}
				for(let i=fight.petal.length-1;i>=0;i--) if(fight.petal[i].name==="Web") {
					fight.petal[i].effect.duration--
					if(fight.petal[i].effect.duration<=0) {
						fight.petal[i].destroy()
						await collapseGrid(getGrid(0,fight.petal[i].x,fight.petal[i].y))
						fight.petal.splice(i,1)
					}
				}
				fight.turn="Flower"
				fight.manipulate=false
				for(let i=0;i<fight.petal.length;i++) fight.petal[i].progress()
				if(fight.environment===5) {
					for(let i=1;i<=4;i++) fight.environmentdetail[i]=determine(50)
				} else if(fight.environment===15) {
					for(let i=1;i<=4;i++) fight.environmentdetail[i]=determine(80)
				}
				if((fight.environment===5 || fight.environment===15) && fight.environmentdetail[0]) {
					for(let i=0;i<=4;i++) fight.environmentdetail[i]=false
				}
				updateT()
				return
			}
			if(fight.turn==="Flower") {
				if(!fight.flower.effect.hasOwnProperty("suppression")) {
					let pendingHeal=0
					for(let i=0;i<fight.petal.length;i++) {
						if(fight.petal[i].name==="Leaf") {
							pendingHeal+=fight.petal[i].health/10
						}
						if(fight.petal[i].name==="Starfish") {
							if(fight.flower.currenthealth<=fight.flower.health/2) pendingHeal+=fight.petal[i].health/6
						}
					}
					if(getTalentLevel(1)>0) pendingHeal+=TalentXList[1][getTalentLevel(1)]
					if(pendingHeal>0) flowerHeal(approx(pendingHeal),"Passive Healings")
				}
				let energyLoss=1
				if(fight.environment===12) {
					energyLoss*=2
				}
				fight.energy-=approx(energyLoss)
				explore.energy=fight.energy
				updateFlowerState()
				if(explore.energy<5000) {
					setExplore()
					flowerRetreat()
				}
				addLog("[Turn] "+translateText("Flower turn ended. Mob turn starts."),"#df9f9f")
				fight.turn="Mob"
				fight.manipulate=true
				for(let i=fight.mob.length-1;i>=0;i--) {
					fight.mob[i].progress()
					if(fight.mob[i].effect.hasOwnProperty("poison")) {
						if(fight.mob[i].effect.hasOwnProperty("immunity")) fight.mob[i].effect.poison[0]=0
						addLog("[Mob] "+translateText(fight.mob[i].name)+translateText(" received ")+fight.mob[i].effect.poison[0]+translateText(" damage from poison."),"#bfbf00")
						fight.mob[i].currenthealth-=fight.mob[i].effect.poison[0]
						fight.mob[i].effect.poison.splice(0,1)
						if(!fight.mob[i].effect.poison.length) delete fight.mob[i].effect.poison
						fight.mob[i].print()
						if(fight.mob[i].currenthealth<=0) {
							await fight.mob[i].remove()
							continue
						}
					}
					if(fight.mob[i].effect.hasOwnProperty("vulnerability")) {
						fight.mob[i].effect.vulnerability.splice(0,1)
						if(!fight.mob[i].effect.vulnerability.length) delete fight.mob[i].effect.vulnerability
					}
				}
				fillMob()
				if(fight.mob.length===0) return
				mobActionCheck()
				return
			}
		}
		async function flowerRetreat() {

			updateFlowerState()
			clearAllInterval()
			document.getElementById("end1").style["pointer-events"]="unset"

				await delay(100)
			}
			safeReload()
		}
		function flowerInjure(damage,mob,detailmob) {
			let mobName=mob
			if(isMob(mob)) mobName=mob.name
			if(mobName==="Poison") {
				addLog("[Flower] "+translateText("Flower")+translateText(" is poisoned."),"#00bfbf")
				let resultingPoison=damage.effectdamage,resultingTurn=damage.effectturn
				if(fight.environment===14) {
					resultingPoison+=approx(resultingPoison/5)
					flowerInjure(resultingPoison*resultingTurn,"Poison Result")
					return
				}
				if(getTalentLevel(8)>0 && fight.environment!==4) {
					resultingPoison-=approx(resultingPoison*TalentXList[8][getTalentLevel(8)]/100)
				}
				if(!fight.flower.effect.hasOwnProperty("poison")) fight.flower.effect.poison=new Array()
				for(let i=0;i<resultingTurn;i++) {
					if(!fight.flower.effect.poison.hasOwnProperty(i)) fight.flower.effect.poison[i]=0
					if(fight.environment===4) {
						fight.flower.effect.poison[i]+=resultingPoison
					} else {
						if(fight.flower.effect.poison[i]<resultingPoison) fight.flower.effect.poison[i]=resultingPoison
					}
				}
				updateFlowerState()
				return
			}
			if(mobName==="Suppression") {
				addLog("[Flower] "+translateText("Flower")+translateText(" is suppressed."),"#00bfbf")
				let resultingTurn=damage.effectturn
				if(!fight.flower.effect.hasOwnProperty("suppression")) fight.flower.effect.suppression={turn:0}
				if(fight.flower.effect.suppression.turn<resultingTurn) {
					fight.flower.effect.suppression.turn=resultingTurn
				}
				updateFlowerState()
				return
			}
			if(mobName==="Vulnerability") {
				addLog("[Flower] "+translateText("Flower")+translateText(" is vulnerable."),"#00bfbf")

					} else if(fight.flower.effect.vulnerability[i]<resultingStrength) {
						fight.flower.effect.vulnerability[i]=resultingStrength
					}

				return
			}
			if(mobName==="Wither") {
				addLog("[Flower] "+translateText("Flower")+translateText(" is withered."),"#00bfbf")
				let resultingStrength=damage.effectstrength

				fight.flower.effect.wither.debuff+=resultingStrength

				return
			}

				let damageBuff=20*(mob.effect.quickness-4)

			if(isMob(mob) && mob.currenthealth===mob.health) {
				if(fight.environment===8) {

					resultingDamage+=approx(1.5*resultingDamage)
				}
			}

			if(fight.flower.effect.hasOwnProperty("resistance") && isMob(mob)) {

			addLog("[Flower] "+translateText("Flower")+translateText(" received ")+translateText(mobName,"CH")+translateText("造成的","CH")+resultingDamage+translateText("伤害","CH")+translateText(" damage from ","EN")+translateText(mobName,"EN")+translateText("."),"#00bfbf")
			let resultingInjure=resultingDamage

		function getTalent(talentIndex,talentIndex2) {

		function getTalentNodeName(talentIndex) {

		function talentState(talentIndex) {
			if(talentIndex>10000) {
				let endpoint1=betterFloor(talentIndex/100),endpoint2=betterFloor(talentIndex/10000)*100+talentIndex%100
				if(talentState(endpoint1)==="Locked" || talentState(endpoint2)==="Locked") return "Locked"
				if(talentState(endpoint1)==="Purchased" && talentState(endpoint2)==="Purchased") return "Purchased"
				return "Unlocked"
			}
			if(player.talent.indexOf(talentIndex)!==-1) return "Purchased"
			if(talentIndex===133 || talentIndex===231 || talentIndex===322) return "Unlocked"
			for(let i of player.talent) if(betterFloor(i/100)===betterFloor(talentIndex/100) && TalentTreeBranchList[betterFloor(talentIndex/100)].indexOf(i%100+talentIndex%100+99*Math.min(i%100,talentIndex%100))!==-1) return "Unlocked"
			return "Locked"
		}
		function talentColor(talentIndex) {
			let pendingState=talentState(talentIndex)
			if(pendingState==="Purchased") return "dgreen"
			if(pendingState==="Unlocked") return "dyellow"
			return "grey"
		}
		function talentCost(talentIndex) {
			if(talentIndex===133 || talentIndex===231 || talentIndex===322) return 0
			for(let i in TalentNameList) if(getTalentNodeName(talentIndex).replaceAll(" ","").slice(0,3)===TalentNameList[i].slice(0,3).toUpperCase()) {
				return TalentCostList[i]
			}
		}
		async function studyTalent(talentNode) {
			if(animation) return
			let talentIndex=parseInt(talentNode.getAttribute("value"))
			if(talentState(talentIndex)!=="Unlocked") return
			if(RemainingTalentPoint()<talentCost(talentIndex)) return
			animation=true
			for(let i=0;i<=10;i++) {
				getTalent(talentIndex).style.opacity=1-i/10
				await delay(100)
			}
			getTalent(talentIndex).classList.replace("fdyellow-path","fdgreen-path")
			player.talent.push(talentIndex)
			document.getElementById("remaintp").innerHTML=document.getElementById("remaintp").innerHTML.replace(/\d+/,RemainingTalentPoint())
			for(let i=0;i<=10;i++) {
				getTalent(talentIndex).style.opacity=i/10
				await delay(100)
			}
			for(let i=1;i<=16;i++) if(getTalentNodeName(talentIndex).replaceAll(" ","").slice(0,3)===TalentNameList[i].slice(0,3).toUpperCase()) {
				document.getElementById("talent-des"+i).innerHTML=printTalentDescription(i)
			}
			for(let i of TalentIndexList) if(betterFloor(i/100)===betterFloor(talentIndex/100) && TalentTreeBranchList[betterFloor(talentIndex/100)].indexOf(i%100+talentIndex%100+99*Math.min(i%100,talentIndex%100))!==-1) {
				if(talentState(i)==="Purchased") {
					getTalent(talentIndex,i).classList.replace("dyellow-path","dgreen-path")
				} else {
					getTalent(talentIndex,i).classList.replace("grey-path","dyellow-path")
					getTalent(i).classList.replace("fgrey-path","fdyellow-path")
				}
			}
			updateFlowerState()
			animation=false
		}

			let maxLevel=0
			for(let i of player.talent) if(getTalentNodeName(i).replaceAll(" ","").slice(0,3)===talentName.slice(0,3).toUpperCase()) {
				maxLevel=Math.max(maxLevel,parseInt(getTalentNodeName(i).slice(-1)))
			}
			return maxLevel
		}

			editingTalentHTML+="<span>(<span style='color: #5fbf5f'>"+TalentXList[TalentID][0]+"</span>"
			for(let i=1;i<TalentXList[TalentID].length;i++) {

			bookHTMLTrans["Flower Artisan Guide"]="<h2>花朵工艺指南</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>将常见的花瓣组合或者提炼，化为新的形式。组合相似的花瓣，则在[级别]上更进一步，使其更为锋利。提炼高[级别]的花瓣，则在[品质]上更进一步，使其经久耐用。唯有将两种方法牢记于心，才能将敌人尽数征服。此书指引你在花瓣制作工艺上登峰造极。</span><br><span>对于[升阶]，你只需要选择1个拥有正[强化等级]的花瓣（而且不能是神话[稀有度]的）。[强化等级]越高，成功率越高。对于[强化等级]不低于4的花瓣，成功率恒定为100%。但是，在有些情况下，你会发现这是不值得的。更高的[稀有度]在提升花瓣[耐久]的同时，还可能使[伤害]显著降低。这是因为<span class='bold'>[升阶]将会重置[强化等级]</span>。</span><br><span>对于[升级]，你需要选择至少两个[稀有度]和[强化等级]均相同的同种花瓣。成功率随[稀有度]和[强化等级]的增长而降低，直到3[强化等级]时停止。你可以通过同时投入更多的花瓣增加成功的概率。投入(X+1)个花瓣将会使概率变为基础值的(X+1)倍。不过注意，超过100%的成功概率是没有作用的，而且当失败时，损失的花瓣数介于1和X之间，所以将所有花瓣放在一起合成并不是明智之举。</span><br><span>在开始前，还要提醒你一点：[四基础影响因子]（[速度]，[冷却]，[攻击率加成]，[防御率加成]）在[升阶]时<span class='bold'>保留</span>，在[升级]时<span class='bold'>分别独立继承</span>一个材料的相应属性。明智的选择你的材料！这里还有一个使用便捷的多功能计算器，只需要简单输入稀有度和等级，比如3 0或者4 2。</span><input type='text' tabindex='-1' id='craft-detail' onkeydown='craftdetail(event.key)' class='inner-input' list='craftdetaillist' autocomplete='off' title='Craft Detail'><datalist id='craftdetaillist'><option value='3 0'><option value='4 2'></datalist>"
			bookHTMLTrans["Flower Combat Guide"]="<h2>花朵战斗指南</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>生物会在你第一次踏入一个地图时生成，与你战斗。有一个和楼层相关的阈值，防止过多生物同时生成。因此，当你击败一个生物后，新的生物可能会继续生成。被其它生物召唤的生物不计入这个限制。</span><br><span>左侧的青色竖条代表你的[能量]。在进入地图战斗时，你花瓣的耐久和伤害将会乘以[能量]。[能量]低于50%将会直接导致死亡。在击败丛林之门的生物后，你进入下一层，并恢复(5+楼层数)%[能量]。</span><br><span>一个战斗回合分为以下几部分：在开始时，你的花瓣根据速度属性获得行动条。你可以[移动]花瓣，使用花瓣[攻击]，或是使用花瓣的[特殊技能]。随后，生物获得行动条，行动条达到或超过阈值的生物对你发起攻击，而你使用花瓣进行防御。如果你跳过防御阶段，或者防御失败，你将会受到伤害。默认数值下，[移动]花瓣消耗100行动条（但需要200行动条），使用花瓣[攻击]和[特殊技能]消耗200行动条，生物行动的阈值为200行动条。</span><br><span>你的花瓣可以在<span class='bold'>同列或侧列</span>[攻击]或者[防御]生物。[攻击]生物的成功率取决于花瓣[攻击率]（[前排攻击率]为[攻击率2]，[中排攻击率]为[攻击率1]）和生物[闪避率]，[防御]生物的成功率取决于[花瓣防御率]（[后排防御率]为[防御率2]，[中排防御率]为[防御率1]）和生物[闪避率]。这两者的公式有明显的区别。当生物在侧列时，公式中还会加入花瓣的[尺寸]属性。花瓣[尺寸]上限20，但对于侧列防守的最佳值为<span class='bold'>17到18[尺寸]</span>。</span><br><span>对发射类花瓣，在攻击成功率公式中的[攻击率]初始为[命中率]，每单位距离使[命中率]减少[命中率衰减]。</span><br><span>你面对的敌人来自四面八方，所以<span class='bold'>第一列和最后一列是相连的</span>，这意味着你的花瓣或者生物都可以从第一列移动到最后一列，反之亦然，并且第一列和最后一列是彼此的侧列。两个方格的距离由曼哈顿距离（横向与纵向距离之和）给出，<span class='bold'>而非使用勾股定理计算</span>。'退场'意味着一个花瓣消失，并且不能在同场战斗中再次使用。如果你被击败，你会丢失所有这场战斗中的掉落物。</span><br><span>你可以在下面的输入框中计算概率。例如，Aa-48S12计算使用12[尺寸]，100%[攻击率]，-4[攻击率加成]的花瓣在侧列攻击80%[闪避率]的生物的成功率。A4+a6F计算使用40%[攻击率]，+10[攻击率加成]的花瓣在同列攻击60%[闪避率]的生物的成功率。D3+05F计算使用30%[防御率]，+0[防御率加成]的花瓣在同列防御50%[闪避率]的生物的成功率。</span><input type='text' tabindex='-1' id='combat-calc' onkeydown='combatcalc(event.key)' class='inner-input' list='calclist' autocomplete='off' title='Calculator'><datalist id='calclist'><option value='Aa-48S12'><option value='A4+a6F'><option value='D3+05F'></datalist>"
			bookHTMLTrans["Flower Control Guide"]="<h2>花朵操控指南</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><h3>快捷键</h3><div class='green-bg inner-box'><span style='color: #7f7f7f'>S：开/关设置</span><span style='color: #7f7f7f'>H：开/关帮助</span><span style='color: #7f7f7f'>Z：开/关仓库</span><span style='color: #7f7f7f'>V：开/关图鉴</span><br><span style='color: #9f9f00'>W=↑：上移</span><span style='color: #9f9f00'>D=→：右移</span><span style='color: #9f9f00'>S=↓：下移</span><span style='color: #9f9f00'>A=←：左移</span><br><span style='color: #009f9f'>T：结束回合（大部分情况下）</span><span style='color: #009f9f'>M：移动</span><span style='color: #009f9f'>R：攻击</span><span style='color: #009f9f'>X：特殊行动（不限于技能）</span><br><span style='color: #ffffff'>回车键：确认</span><span style='color: #ffffff'>退格键：取消</span></div>"
			bookHTMLTrans["Flower Environmental Guide"]="<h2 style='color: #ffe65d; filter: brightness(90%); pointer-events: none'>花朵环境指南</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>从现在开始，周围的[环境]正发生改变，并且在将来继续<span class='bold'>恶化</span>。水土不服的花朵将会面临重重险阻，而适应于[环境]的生物如鱼得水，甚至能将[环境]化为己用。这将是巨大的挑战。[环境]与地图所处的群系息息相关。在继续前进的道路上，你需要注意[环境]的变化，并做好准备。以下是一些关于[环境]的信息。</span>"
			bookHTMLTrans["Flower Evolutionary Guide"]="<h2>花朵进化指南</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>消耗花瓣，取其精华。以最原始的能量滋养你的成长，使你升级进化。随着一缕缕[经验]的注入，你变得更强，打开高阶能力的道路，自然取得新的高度。这一古老的生长循环将在此书中详细展开。</span><br><span>你从击败的生物上获得花瓣，高[稀有度]的生物具有更好的掉落物。不同生物掉落各式各样的花瓣，掉率从1档到5档不等，你可以在图鉴中查看细节。一个花瓣的[经验]等于<span class='bold'>([稀有度因子])*([强化等级]+1)</span>。对于普通，罕见，稀有，史诗，传奇，神话花瓣，[稀有度因子]分别是8，12，20，40，100，300。</span><br><span>这并不是一个难以理解的机制，为此你并不需要一个计算器，所以我提供了另一个计算器帮你计算花瓣的基础属性。<span class='bold'>除了一些特殊种类外</span>，你获得的花瓣具有20%属性浮动。你只需要简单输入[名称]，[稀有度]，[强化等级]就能使用下面这个输入框。例如，Corn 3 0计算[稀有度]为稀有的玉米的属性，Plank 4 2计算[稀有度]为史诗，[强化等级]为2的木板的属性。</span><input type='text' tabindex='-1' id='petal-stat' onkeydown='petalstat(event.key)' class='inner-input' list='petalstatlist' autocomplete='off' title='Petal Stat'><datalist id='petalstatlist'><option value='Corn 3 0'><option value='Plank 4 2'></datalist>"
			bookHTMLTrans["Flower Game Guide"]="<h2>花朵游戏指南 <span style='color: #0078d7; font-style: italic; font-size: 12px; font-weight: noremal'>//六三六一（试图翻译C++代码限定版）</span></h2><div class='white-bg inner-box'><span style='color: #008000'>#包含&lt;游玩PFLF的工具.h&gt; <span style='color: #0078d7; font-style: italic;'>//应当进行替代</span></span><span style='color: #008000'>#包含&lt;io小河&gt;</span><span style='color: #008000'>#包含&lt;时间.h&gt;</span><span style='color: #008000'>#包含&lt;数学.h&gt;</span><span style='color: #008000'>#包含&lt;细绳.h&gt;</span><span style='color: #008000'>#包含&lt;f小河.h&gt;</span><span><span style='font-weight: bold'>正在使用 命名空间</span> std<span style='color: #ff0000; font-weight: bold'>;</span></span><span><span style='font-weight: bold'>虚无</span> 菜单<span style='color: #ff0000; font-weight: bold'>()</span></span><span style='color: #ff0000; font-weight: bold'>{</span><span style='margin-left: 2em'>系统<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #0000ff; font-weight: bold'>\"cls\"</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>缓慢输出<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #0000ff; font-weight: bold'>\"↓更多 游戏 (点击!)↓\"</span><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>缓慢输出<span style='color: #ff0000; font-weight: bold'>(</span><a href='https://6triple6single.github.io/PFLF' target='_blank' style='color: #0000ff; font-weight: bold; text-decoration: none'>\"PFLF\"</a><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>缓慢输出<span style='color: #ff0000; font-weight: bold'>(</span><a href='https://6triple6single.github.io/Virus1' target='_blank' style='color: #0000ff; font-weight: bold; text-decoration: none'>\"病毒 1\"</a><span style='color: #ff0000; font-weight: bold'>,</span><span style='color: #800080'>50</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'><span style='font-weight: bold'>返回</span><span style='color: #ff0000; font-weight: bold'>;</span></span><span style='color: #ff0000; font-weight: bold'>}</span><span><span style='font-weight: bold'>整数</span> 主要<span style='color: #ff0000; font-weight: bold'>()</span></span><span style='color: #ff0000; font-weight: bold'>{</span><span style='margin-left: 2em'>系统<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #0000ff; font-weight: bold'>\"cls\"</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='margin-left: 2em'>沉睡<span style='color: #ff0000; font-weight: bold'>(</span><span style='color: #800080'>2000</span><span style='color: #ff0000; font-weight: bold'>);</span></span><span style='color: #0078d7; font-style: italic; margin-left: 2em'>// 加载文本();</span><span style='color: #0078d7; font-style: italic; margin-left: 2em'>// 加载图鉴();</span><span style='color: #0078d7; font-style: italic; margin-left: 2em'>// 加载功绩();</span><span style='margin-left: 2em'>菜单<span style='color: #ff0000; font-weight: bold'>();</span></span><span style='margin-left: 2em'><span style='font-weight: bold'>返回</span> <span style='color: #800080'>0</span><span style='color: #ff0000; font-weight: bold'>;</span></span><span style='color: #ff0000; font-weight: bold'>}</span></div>"
			bookHTMLTrans["Flower Survival Guide"]="<h2>花朵生存指南</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>你说得对，但是《弗洛尔房间》是由[七十九的平方等于六三六一]自主研发的一款全旧封闭卡牌游戏。游戏发生在一个被称作[花室]的幻想世界，在这里，被[M614656]选中的人将被授予[槽位]，导引花瓣之力。你将扮演一位名为[旅行者]的神秘角色，在从1层攀爬到7层的旅途中肘飞技能各异，奖励独特的同伴们，把他们和强敌一起击败，找回失散的图鉴，后面忘了。</span><br><span>这是你的第一本书，随着故事的发展，你会收获更多知识，同样可以在帮助页面查看。如果你没有在[花室]战斗的经验，无伤大雅，我写了<span class='bold'>花朵战斗指南（Flower Combat Guide）</span>和<span class='bold'>花朵术语指南（Flower Terminology Guide）</span>，在下面输入书的（英文）名称即可获得！</span><br><span>如果你想起来了什么，写在下面的输入框，取回相应的物品。</span><input type='text' tabindex='-1' id='item-code' onkeydown='itemcode(event.key)' class='inner-input' autocomplete='off' title='Code'><span>（不区分<span style='font-size: 1.1em'>大</span><span style='font-size: 0.9em'>小</span>写&amp;自动 忽略 空 格）</span>"
			bookHTMLTrans["Flower Talent Guide"]="<h2 style='color: #7eef6d'>花朵天赋指南</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><span>唤醒你身体的潜能。[天赋点]通过升级获取，激活天赋后，你可以通过投入[天赋点]激活自身的先天能力。注意，天赋的路线并非一成不变。你可以重置你的选择，取回[天赋点]，但每次重塑会有<span class='bold'>增长的代价</span>。三思而后行。</span><br><span>购买STA1~3开始一棵天赋树。你可以购买以枝干相连的节点，它们被染成黄色。</span><br><span>最下方列出的天赋，对应的节点字母分别是：REC，MED，ARM，REL，CUT，HEA，ACT；ANT，TAL，STR，CLE，KNO；ACC，SIZ，CRA，GEM。</span>"
			bookHTMLTrans["Flower Terminology Guide"]="<h2>花朵术语指南</h2><span class='nowrap'>🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲🎲</span><br><h3>稀有度</h3><span style='color: #000000'>0=无</span><span style='color: #7eef6d'>1=普通</span><span style='color: #ffe65d'>2=罕见</span><span style='color: #ffe65d; filter: brightness(90%)'>(2)=罕见</span><span style='color: #4d52e3'>3=稀有</span><span style='color: #861fde'>4=史诗</span><span style='color: #de1f1f'>5=传奇</span><span style='color: #1fdbde'>6=神话</span><span style='color: #ff2b75'>7=究极</span><span style='color: #2bffa3'>8=超级</span><span style='color: #2bffa3; filter: brightness(90%)'>(8)=超级</span><span style='color: #555555'>9=唯一</span><h3>花瓣面板</h3><span><span class='bold'>耐久</span>：花瓣在摧毁前可以承受的伤害。</span><span><span class='bold'>伤害</span>：花瓣可以造成的伤害。</span><span><span class='bold'>尺寸</span>：尺寸是介于1和20之间的数值，影响侧列攻击/防御的准度。侧列攻击/防御中，最终生效的攻击率/防御率百分比会减少(18-尺寸)(17-尺寸)/2。</span><span><span class='bold'>速度</span>：花瓣每回合获得的行动条。</span><span><span class='bold'>冷却</span>：花瓣被重新加载所需要的行动条。</span><span><span class='bold'>行动条</span>：花朵回合开始时你的花瓣获得行动条。行动条可以用来重新加载花瓣，移动花瓣，或者使用花瓣攻击。部分花瓣的技能需要行动条发动。</span><span><span class='bold'>攻击率</span>：花瓣攻击的准度。只有正攻击率的花瓣才能被用来攻击。攻击率1（箭头前面）决定了花瓣在中排时的攻击准度，攻击率2（箭头后面）决定了花瓣在前排时的攻击准度。</span><span><span class='bold'>防御率</span>：花瓣防御的准度。只有正防御率的花瓣才能被用来防御。防御率1（箭头前面）决定了花瓣在中排时的防御准度，防御率2（箭头后面）决定了花瓣在后排时的防御准度。</span><span><span class='bold'>攻击率加成</span>：攻击率加成是介于-10和10之间的数值，影响生效的攻击率百分比。低于5攻击率加成的花瓣在侧列攻击时会额外受到一个削弱。</span><span><span class='bold'>防御率加成</span>：防御率加成是介于-10和10之间的数值，影响生效的防御率百分比。低于5防御率加成的花瓣在侧列防御时会额外受到一个削弱。</span><span><span class='bold'>属性浮动</span>：花瓣的耐久/伤害/速度/冷却属性具有20%/20%/10%/10%浮动值。后面的<span class='bold'>强强/有点强/平均水准/有点弱/弱弱</span>表示这个属性（相较于同品阶同种花瓣）的强度，冷却越低越好。</span><br><h3>生物面板</h3><span><span class='bold'>被动</span>：生物在默认情况下不会攻击你。</span><span><span class='bold'>中立</span>：生物在受到你花瓣造成的伤害前不会攻击你。中立生物以30%概率在行动前转为敌对。</span><span><span class='bold'>中立+</span>：敌对状态的中立生物。</span><span><span class='bold'>敌对</span>：生物在行动时会攻击你。</span><span><span class='bold'>生命值</span>：生物被摧毁前可以承受的伤害。</span><span><span class='bold'>伤害</span>：生物可以造成的伤害。</span><span><span class='bold'>闪避率</span>：生物的准度，同时也降低被命中的概率。</span><span><span class='bold'>速度</span>：生物每回合获得的行动条。</span><span><span class='bold'>行动条</span>：生物在生物回合开始后获得行动条。生物行动花费200行动条。</span><br><h3>花瓣词条</h3><span><span class='bold'>词条</span>：花瓣的特性或技能，只取决于花瓣种类。</span><span><span class='bold'>部分</span>：花瓣具有多个部分。在耐久变为0时，花瓣丢失1个部分数，而不是直接摧毁，溢出的伤害被清除。</span><span><span class='bold'>花瓣属性</span>：花瓣的先天特性，这甚至可以影响仓库中的花瓣。</span><span><span class='bold'>装备时</span>：特殊影响，只在战斗开始时作用一次。</span><span><span class='bold'>存在时</span>：花瓣被加载后，产生持续性的影响。</span><span><span class='bold'>攻击时</span>：花瓣攻击的连带作用。</span><span><span class='bold'>防御时</span>：花瓣防御的连带作用。</span><span><span class='bold'>攻击或防御时</span>：花瓣攻击或防御时的连带作用。</span><span><span class='bold'>发射时</span>：花瓣可以被发射。细节已经在花朵战斗指南中列出。</span><span><span class='bold'>特殊技能</span>：花瓣的特殊技能。</span><span><span class='bold'>回合结束前</span>：在花朵回合结束前的效果。</span><span><span class='bold'>部分摧毁时</span>：在花瓣的一部分被摧毁时会发生的事，最后一部分除外。</span><span><span class='bold'>摧毁时</span>：花瓣彻底被摧毁后会发生的事。重置属性意味着通过该花瓣的其它词条获得的削弱/增益会被重置。</span><br><span><span class='bold' style='color: #bf00bf; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>剧毒</span>：花瓣能造成剧毒伤害，这是一种特殊伤害。</span><span><span class='bold' style='color: #7fffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>闪电</span>：花瓣能造成闪电伤害，这是一种特殊伤害。</span><span>词条中的数值标识：<span class='bold' style='color: #7fdf7f; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>耐久</span>，<span class='bold' style='color: #ff7f7f; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>伤害</span>，<span class='bold' style='color: #00dfff; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>稀有度</span>，<span class='bold' style='color: #9f5fff; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>等级</span></span><br><h3>生物词条</h3><span><span class='bold'>Boss</span>：Boss生物在被花瓣攻击时获得迅捷效果。迅捷效果在生物行动后重置为0。</span><span><span class='bold'>生命</span>：生物具有多于1条生命。在生命值变为0时，生物丢失1个生命数，而不是直接摧毁，溢出的伤害被清除。同样也称为<span class='bold'>部分</span>。</span><span><span class='bold'>生物属性</span>：生物与生俱来的特性。</span><span><span class='bold'>存在时</span>：生物存活时，产生持续性的影响。</span><span><span class='bold'>生物行动</span>：这个生物可能不使用默认行动。</span><span><span class='bold'>攻击时</span>：生物攻击的连带作用。</span><span><span class='bold'>特征</span>：一些有关结算伤害的特点。</span><span><span class='bold'>部分摧毁时</span>：在生物的一部分被摧毁时会发生的事，最后一部分除外。</span><span><span class='bold'>摧毁时</span>：生物彻底被摧毁后会发生的事。</span><br><span><span class='bold' style='color: #bf00bf; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>剧毒</span>：生物能造成剧毒伤害，这是一种特殊伤害。</span><span><span class='bold' style='color: #7fffff; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>闪电</span>：生物能造成闪电伤害，这是一种特殊伤害。</span><span>词条中的数值标识：<span class='bold' style='color: #7fdf7f; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>生命值</span>，<span class='bold' style='color: #ff7f7f; text-shadow: 1px 1px 3px rgba(0,0,0,0.7)'>伤害</span>"
			document.getElementById("import-btn").innerHTML="取回记忆"
			document.getElementById("restart-btn").innerHTML="重启宇宙"
			document.getElementById("export-btn").innerHTML="存储记忆"
		}
	</script>
